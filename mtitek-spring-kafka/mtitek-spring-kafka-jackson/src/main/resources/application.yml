# The values given here are the default values. But they are explicitly set here as an example of setting the Kafka properties.
spring:
  kafka:
    bootstrap-servers:
    - localhost:9092
    template:
      default-topic: mtitek-kafka-topic-1
    producer:
      keySerializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      valueSerializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

    consumer:
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        "[spring.json.value.default.type]": "com.mtitek.spring.model.AppProfile"
        "[spring.json.trusted.packages]": "com.mtitek.spring.model"

  jackson:
    mapper:
      accept-case-insensitive-enums: true