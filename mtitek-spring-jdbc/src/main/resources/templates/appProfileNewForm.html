<html xmlns:th="http://www.thymeleaf.org">
<head><title>New App Profile</title></head>

<body>
<h1>New App Profile</h1>

<form action="/appProfiles/new" method="post">

    <label for="id">ID:</label><br/>
    <input type="text" id="id" name="id" required/><br/><br/>

    <label for="name">Name:</label><br/>
    <input type="text" id="name" name="name" required/><br/><br/>

    <label for="role">Role:</label><br/>
    <select id="role" name="role">
        <option th:each="role : ${T(com.mtitek.spring.model.AppProfile.Role).values()}"
                th:value="${role}"
                th:text="${role}">
        </option>
    </select><br/><br/>

    <button type="submit">Create</button>

</form>

<br/>
<a href="/appProfiles/list">Back to list</a>
</body>
</html>
